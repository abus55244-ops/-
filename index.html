function useInstallPrompt(){
  const [deferred,setDeferred]=useState(null);
  const [installed,setInstalled]=useState(
    window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true);
  useEffect(()=>{
    const onPrompt=(e)=>{ e.preventDefault(); setDeferred(e); };
    const onInstalled=()=>setInstalled(true);
    window.addEventListener("beforeinstallprompt",onPrompt);
    window.addEventListener("appinstalled",onInstalled);
    return ()=>{ window.removeEventListener("beforeinstallprompt",onPrompt);
      window.removeEventListener("appinstalled",onInstalled); };
  },[]);
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
  const promptInstall = async ()=>{
    if(!deferred) return;
    deferred.prompt();
    await deferred.userChoice;
    setDeferred(null);
  };
  return { installed, isIOS, canPromptNative: !!deferred, promptInstall };
}

function InstallBanner(){
  const {installed,isIOS,canPromptNative,promptInstall} = useInstallPrompt();
  const [dismissed,setDismissed]=useState(false);

  return React.createElement("div",{style:{background:C.puL,border:`1px solid ${C.pu}30`,

      hostelDb.ref("studentRoster").once("value").catch(()=>null),
    ]).then(([attSnap,rosterSnap])=>{
      if(cancelled) return;
      const todayISO = new Date().toISOString().slice(0,10);
      const attRaw = attSnap ? Object.values(attSnap.val()||{}) : [];
      const hostelRoster = rosterSnap ? (rosterSnap.val()||{}) : {};
      const hostelNameSet = new Set();
      Object.keys(DEFAULT_STUDENTS).forEach(cls=>{
        const list = hostelRoster[cls] !== undefined ? hostelRoster[cls] : (DEFAULT_STUDENTS[cls]||[]);
        list.forEach(n=>hostelNameSet.add(normalizeName(n)));
      });
      const notDoneToday = new Set();
      attRaw.forEach(rec=>{

  const combined = useMemo(()=>{
    if(hostelRoster===null || haisCustom===null || dayScholars===null) return null;
    const allClasses = new Set([...Object.keys(DEFAULT_STUDENTS),
      ...Object.keys(hostelRoster), ...Object.keys(haisCustom)]);
    const rows = [];
    allClasses.forEach(cls=>{
      const hostelList = hostelRoster[cls] !== undefined ? hostelRoster[cls] : (DEFAULT_STUDENTS[cls]||[]);

      names.forEach(name=>{
        rows.push({
          key: normalizeName(name)+"|"+cls,
          name, cls,
          inHostel: hostelList.includes(name),
          inAcademic: haisList.includes(name),
          isDayScholar: dayScholarList.includes(name),

        marginBottom:6,cursor:"pointer"}},
      React.createElement("div",null,
        React.createElement("div",{style:{fontWeight:600,fontSize:13}}, r.name),
        React.createElement("div",{style:{fontSize:10.5,color:C.mu}},
          "শ্রেণি "+r.cls+(CLASS_BN[r.cls]?" ("+CLASS_BN[r.cls]+")":""))),
      React.createElement("div",{style:{display:"flex",gap:4}}, hostelBadge, academicBadge));
  });

  const resultsList = React.createElement("div",null,
    React.createElement(Card,null,
      React.createElement("div",{style:{fontWeight:700,fontSize:14,marginBottom:4}},"👨‍🎓 ইউনিফাইড ছাত্র প্রোফাইল"),
      React.createElement("div",{style:{fontSize:11.5,color:C.mu,lineHeight:1.6}},
        "হোস্টেল ও একাডেমিক — দুই ডেটাবেস থেকে লাইভ পড়ে একসাথে দেখানো হচ্ছে। ",
        "এখানে কোনো ডেটা সংরক্ষিত হয় না, শুধু প্রদর্শিত হয়।")),
    err && React.createElement(Card,{style:{background:C.reL,color:C.re,fontSize:12}}, err),

    combined && React.createElement("div",null,
      mismatchCount>0 && React.createElement(Card,{style:{background:"#fff8e1",border:"1px solid #e6cf9e"}},
        React.createElement("span",{style:{fontWeight:700,color:"#a9822f"}}, "⚠️ "+mismatchCount+" জন ছাত্র "),
        "শুধু একটি সিস্টেমে আছে — রোস্টার-সিঙ্ক ফাংশন চালু থাকলে শীঘ্রই মিলে যাবে।"),

  const [data,setData] = useState(null); // null = লোড হচ্ছে
  const [err,setErr] = useState("");

  useEffect(()=>{
    let cancelled=false;
    setData(null); setErr("");
    const upperName = normalizeName(student.name);

    Promise.all([
      hostelDb.ref("behaviorRecords").once("value").catch(()=>null),
      hostelDb.ref("healthRecords").once("value").catch(()=>null),
      hostelDb.ref("leaveRecords").once("value").catch(()=>null),
      haisDb.ref("hais_data_v3/results_v2").once("value").catch(()=>null),
      haisDb.ref("hais_data_v3/studentAttendance_v2").once("value").catch(()=>null),
    ]).then(([bhSnap,hlSnap,lvSnap,resSnap,attSnap])=>{
      if(cancelled) return;

      const matchesName = (v) => v && normalizeName(v.stuName || v.name) === upperName;

      const toArr = (snap) => snap ? Object.values(snap.val()||{}) : [];

      const behavior = toArr(bhSnap).filter(matchesName)
        .sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,15);

      const health = toArr(hlSnap).filter(matchesName)
        .sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,10);

      const todayISO = new Date().toISOString().slice(0,10);
      const leaves = toArr(lvSnap).filter(matchesName)
        .sort((a,b)=>(b.fromISO||"").localeCompare(a.fromISO||"")).slice(0,10);
      const activeLeave = leaves.find(r => (r.fromISO||"9999") <= todayISO && (r.toISO||"0000") >= todayISO);

      const results = toArr(resSnap).filter(r => normalizeName(r.name) === upperName)
        .sort((a,b)=>(b.savedAt||"").localeCompare(a.savedAt||""));

      attRaw.forEach(rec=>{
        const attMap = rec.attendance || {};

          if(normalizeName(nm) === upperName){

      attendanceRows.sort((a,b)=>(b.isoDate||"").localeCompare(a.isoDate||""));

      data.health.length===0 ? EmptyNote("কোনো স্বাস্থ্য রেকর্ড নেই") :

      background:"#eef1f5",borderRadius:8,padding:"7px 9px",marginBottom:12}},

      student.inHostel && React.createElement("a",{href:CONFIG.HOSTEL_APP_URL,target:"_blank",rel:"noopener",

          fontSize:11,textDecoration:"none",textAlign:"center"}}, "🏠 হোস্টেল অ্যাপ"),
      student.inAcademic && React.createElement("a",{href:CONFIG.HAIS_APP_URL,target:"_blank",rel:"noopener",
        style:{flex:1,padding:"8px",borderRadius:8,background:C.puL,color:C.pu,fontWeight:700,

/* ══════════ অনাবাসিক (Day Scholar) তালিকা ব্যবস্থাপনা ══════════ */
function DayScholarsTab(){
  const [dayScholars,setDayScholars]=useState(null);
  const [cls,setCls]=useState("X");
  const [name,setName]=useState("");
  const [msg,setMsg]=useState("");

  useEffect(()=>{
    haisDb.ref("day_scholars").on("value", snap=>setDayScholars(snap.val()||{}));
    return ()=>haisDb.ref("day_scholars").off();
  },[]);

  const allClasses = ["IV","V","VI","VII","VIII","IX","X"];

  const addName = ()=>{
    const n = name.trim().toUpperCase();
    if(!n){ setMsg("নাম লিখুন"); return; }
    const current = (dayScholars && dayScholars[cls]) || [];
    if(current.includes(n)){ setMsg("এই নাম ইতিমধ্যে তালিকায় আছে"); return; }
    haisDb.ref("day_scholars/"+cls).set([...current, n]);
    setName(""); setMsg("✅ যোগ করা হয়েছে");
  };
  const removeName = (c,n)=>{
    const current = (dayScholars && dayScholars[c]) || [];
    haisDb.ref("day_scholars/"+c).set(current.filter(x=>x!==n));
  };

  return React.createElement("div",null,
    React.createElement(Card,null,
      React.createElement("div",{style:{fontWeight:700,fontSize:14,marginBottom:4}},"🎒 অনাবাসিক ছাত্র তালিকা"),
      React.createElement("div",{style:{fontSize:11.5,color:C.mu,lineHeight:1.6,marginBottom:10}},
        "এই তালিকার ছাত্ররা একাডেমিক সিস্টেমে থাকলেও কখনো হোস্টেল রোস্টারে স্বয়ংক্রিয়ভাবে যোগ হবে না — ",
        "রোস্টার-সিঙ্ক ফাংশন এদের বাদ দিয়ে চলবে।"),
      React.createElement("div",{style:{display:"flex",gap:6,marginBottom:6}},
        React.createElement("select",{value:cls,onChange:e=>setCls(e.target.value),
          style:{padding:"8px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:12}},
          allClasses.map(c=>React.createElement("option",{key:c,value:c}, c))),
        React.createElement("input",{type:"text",value:name,onChange:e=>setName(e.target.value),
          placeholder:"ছাত্রের নাম লিখুন...",
          style:{flex:1,padding:"8px 10px",border:`1px solid ${C.bd}`,borderRadius:8,fontSize:12}}),
        React.createElement("button",{onClick:addName,
          style:{padding:"8px 16px",borderRadius:8,border:"none",background:C.pu,color:"#fff",
            fontWeight:700,fontSize:12}},"যোগ করুন")),
      msg && React.createElement("div",{style:{fontSize:11,color:C.pu,fontWeight:600}},msg)),
    !dayScholars && React.createElement(Card,null,"লোড হচ্ছে..."),
    dayScholars && Object.entries(dayScholars).filter(([,list])=>list && list.length>0).map(([c,list])=>
      React.createElement(Card,{key:c},
        React.createElement("div",{style:{fontWeight:700,fontSize:13,marginBottom:8}},
          "শ্রেণি "+c+(CLASS_BN[c]?" ("+CLASS_BN[c]+")":"")),
        list.map(n=>React.createElement("div",{key:n,
          style:{display:"flex",justifyContent:"space-between",alignItems:"center",
            padding:"6px 10px",background:"#f7f7fa",borderRadius:8,marginBottom:5}},
          React.createElement("span",{style:{fontSize:12}}, n),
          React.createElement("button",{onClick:()=>removeName(c,n),
            style:{border:"none",background:C.reL,color:C.re,borderRadius:6,padding:"3px 8px",
              fontSize:11,fontWeight:700}}, "বাদ দিন"))))));
}


/* ══════════ সম্মিলিত র‍্যাংকিং (৭০% একাডেমিক + ৩০% হোস্টেল) ══════════ */
function RankingTab(){
  const [rows,setRows] = useState(null);
  const [err,setErr] = useState("");
  const ACADEMIC_WEIGHT = 0.7, HOSTEL_WEIGHT = 0.3;

  useEffect(()=>{
    let cancelled=false;
    Promise.all([
      haisDb.ref("student_rank_scores").once("value").catch(()=>null),
      hostelDb.ref("student_rank_scores").once("value").catch(()=>null),
    ]).then(([aSnap,hSnap])=>{
      if(cancelled) return;
      const academic = aSnap ? (aSnap.val()||{}) : {};
      const hostel = hSnap ? (hSnap.val()||{}) : {};
      const allKeys = new Set([...Object.keys(academic), ...Object.keys(hostel)]);
      const combined = [];
      allKeys.forEach(key=>{
        const a = academic[key], h = hostel[key];
        if(a && h){
          combined.push({
            key, name: a.name || h.name, cls: a.cls || h.cls,
            academicScore: a.score, hostelScore: h.score,
            combinedScore: Math.round(ACADEMIC_WEIGHT*a.score + HOSTEL_WEIGHT*h.score),
          });
        }
      });
      combined.sort((x,y)=>y.combinedScore-x.combinedScore);
      combined.forEach((r,i)=>{ r.rank = i+1; });
      setRows(combined);
    }).catch(e=>{ if(!cancelled) setErr(e.message); });
    return ()=>{ cancelled=true; };
  },[]);

  return React.createElement("div",null,
    React.createElement(Card,null,
      React.createElement("div",{style:{fontWeight:700,fontSize:14,marginBottom:4}},"🏆 সম্মিলিত র‍্যাংকিং"),
      React.createElement("div",{style:{fontSize:11.5,color:C.mu,lineHeight:1.6}},
        "একাডেমিক (৭০%) ও হোস্টেল (৩০%) — দুই অ্যাপের নিজস্ব চূড়ান্ত স্কোর দিয়ে হিসাব করা। ",
        "যাদের দুই দিকেই স্কোর নেই (যেমন অনাবাসিক ছাত্র), তারা এই তালিকায় দেখা যাবে না।")),
    err && React.createElement(Card,{style:{background:C.reL,color:C.re,fontSize:12}}, err),
    rows===null && !err && React.createElement(Card,null,"লোড হচ্ছে..."),
    rows && rows.length===0 && React.createElement(Card,null,
      "এখনো কোনো স্কোর পাওয়া যায়নি — হোস্টেল ও HAIS অ্যাপে অন্তত একবার র‍্যাংকিং পেজ খোলা দরকার, ",
      "তাহলেই স্কোর প্রকাশ হবে।"),
    rows && rows.length>0 && rows.map(r=>
      React.createElement("div",{key:r.key, style:{display:"flex",alignItems:"center",gap:10,
        padding:"9px 12px",background:"#fff",border:`1px solid ${C.bd}`,borderRadius:10,marginBottom:6}},
        React.createElement("div",{style:{minWidth:28,fontWeight:800,color:C.pu,fontSize:14,textAlign:"center"}},
          r.rank),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{style:{fontWeight:600,fontSize:13}}, r.name),
          React.createElement("div",{style:{fontSize:10,color:C.mu}},
            "শ্রেণি "+r.cls+" • একাডেমিক "+r.academicScore+" • হোস্টেল "+r.hostelScore)),
        React.createElement("div",{style:{fontWeight:800,fontSize:16,color:C.gold}}, r.combinedScore))));
}

/* ══════════ রুট অ্যাপ ══════════ */
function App(){
  const [user,setUser]=useState(undefined); // undefined = লোড হচ্ছে, null = লগইন নেই
  const [role,setRole]=useState(undefined);
  const [authErr,setAuthErr]=useState("");
  const [stuck,setStuck]=useState(false);

  useEffect(()=>{
    // ৮ সেকেন্ডেও প্রাথমিক auth-স্টেট না এলে "আটকে গেছে" ধরে নিয়ে ডায়াগনস্টিক দেখানো হবে
    const watchdog = setTimeout(()=>{ if(user===undefined) setStuck(true); }, 8000);

    let unsub = ()=>{};
    try{
      unsub = auth.onAuthStateChanged(
        u=>{
          clearTimeout(watchdog);
          setUser(u||null);
          if(!u){ setRole(undefined); return; }
          const key = emailKey(u.email);
          haisDb.ref("app_roles/"+key).once("value")
            .then(snap=>{ setRole(snap.val()||null); })
            .catch(e=>{
              setAuthErr("রোল তথ্য পড়া যায়নি: "+e.message+
                " — Firebase Database Rules-এ 'app_roles' পাথে read অনুমতি আছে কিনা চেক করুন।");
              setRole(null);
            });
        },
        e=>{
          clearTimeout(watchdog);
          setAuthErr("Authentication চালু করা যায়নি: "+e.message);
          setUser(null);
        }
      );
    }catch(e){
      clearTimeout(watchdog);
      setAuthErr("Firebase শুরু করা যায়নি: "+e.message+
        " — HAIS_FIREBASE কনফিগারেশন ঠিক আছে কিনা, এবং এই ডোমেইন Firebase Console-এর "+
        "Authentication → Settings → Authorized domains-এ যোগ করা আছে কিনা চেক করুন।");
      setStuck(true);
    }
    return ()=>{ clearTimeout(watchdog); unsub(); };
  },[]);

  if(stuck && user===undefined){
    return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",
      justifyContent:"center",padding:20}},
      React.createElement(Card,{style:{maxWidth:380}},
        React.createElement("div",{style:{fontWeight:700,fontSize:14,color:C.re,marginBottom:8}},
          "⚠️ লোড হতে অস্বাভাবিক সময় লাগছে"),
        authErr && React.createElement("div",{style:{fontSize:12,color:C.re,marginBottom:10,
          background:C.reL,borderRadius:8,padding:"8px 10px"}}, authErr),
        React.createElement("div",{style:{fontSize:12,color:C.mu,lineHeight:1.8}},
          "সাধারণ কারণগুলো চেক করুন:", React.createElement("br",null),
          "১. এই ডোমেইনটা Firebase Console → Authentication → Settings → ",
          React.createElement("b",null,"Authorized domains"),"-এ যোগ করা আছে কিনা", React.createElement("br",null),
          "২. ইন্টারনেট সংযোগ ঠিক আছে কিনা (VPN/নেটওয়ার্ক ফায়ারওয়াল Google-এর ডোমেইন ব্লক করছে কিনা)", React.createElement("br",null),
          "৩. `index.html`-এ `HAIS_FIREBASE` কনফিগারেশনের মান ঠিক আছে কিনা"),
        React.createElement("button",{onClick:()=>window.location.reload(),
          style:{marginTop:14,width:"100%",padding:"9px",borderRadius:10,border:"none",
            background:C.pu,color:"#fff",fontWeight:700}}, "🔄 আবার চেষ্টা করুন")));
  }

  if(user===undefined || (user && role===undefined)){
    return React.createElement("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",
      justifyContent:"center",color:C.mu}}, "লোড হচ্ছে...");
  }
  if(!user){
    return React.createElement(LoginScreen,{onLogin:setUser});
  }
  if(!role){
    return React.createElement(NoRoleScreen,{user, onLogout:()=>auth.signOut(), err:authErr});
  }
  return React.createElement(Dashboard,{user, role, onLogout:()=>auth.signOut()});
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
